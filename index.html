<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="全角カタカナを半角カタカナへ変換し、小文字を大文字にそろえる無料ツールです。ブラウザ内で安全に変換できます。" />
  <meta name="robots" content="index, follow" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'" />
  <title>カタカナ変換ツール | 全角→半角・小文字→大文字</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --primary: #0f172a;
      --primary-hover: #1e293b;
      --accent: #0f766e;
      --danger: #b91c1c;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 56px;
    }

    .hero {
      margin-bottom: 22px;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #ecfeff;
      color: #155e75;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.2;
    }

    .lead {
      margin: 0;
      font-size: 16px;
      line-height: 1.8;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .card-header h2 {
      margin: 0;
      font-size: 22px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--border-strong);
      background: #fff;
      color: var(--text);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
    }

    .btn:hover { background: #f8fafc; transform: translateY(-1px); }
    .btn:focus-visible { outline: 3px solid rgba(15,118,110,.18); outline-offset: 2px; }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .btn-danger {
      color: var(--danger);
      border-color: #fecaca;
      background: #fff5f5;
    }

    textarea {
      width: 100%;
      min-height: 320px;
      border: 1px solid var(--border-strong);
      border-radius: 18px;
      padding: 16px;
      font-size: 20px;
      line-height: 1.75;
      resize: vertical;
      outline: none;
      background: #fff;
    }

    textarea:focus {
      border-color: #64748b;
      box-shadow: 0 0 0 4px rgba(100, 116, 139, 0.12);
    }

    .output {
      background: #f8fafc;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .message {
      margin-top: 12px;
      min-height: 1.5em;
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
    }

    .warning {
      color: var(--danger);
    }

    .options {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .option-item {
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.82);
      box-shadow: var(--shadow);
    }

    .option-item h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .option-item p, .option-item li {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }

    .option-item ul {
      padding-left: 18px;
      margin: 0;
    }

    .footer-note {
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.8;
    }

    @media (max-width: 920px) {
      .grid, .options { grid-template-columns: 1fr; }
      textarea { min-height: 220px; font-size: 18px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <div class="badge">無料・ブラウザ内変換・保存なし</div>
      <h1>カタカナ変換ツール</h1>
      <p class="lead">全角カタカナを半角カタカナへ変換し、小文字は大文字へ統一します。変換はブラウザ内だけで完結するため、入力内容をサーバーへ送信しません。</p>
    </section>

    <section class="grid" aria-label="変換エリア">
      <section class="card">
        <div class="card-header">
          <h2>入力</h2>
          <div class="toolbar">
            <button class="btn" id="sampleBtn" type="button">サンプル入力</button>
            <button class="btn btn-danger" id="clearBtn" type="button">クリア</button>
          </div>
        </div>
        <textarea id="inputText" placeholder="例：アイウエオ、キャッシュ、バイチケ" maxlength="10000" aria-label="入力欄"></textarea>
        <div class="meta">
          <span id="inputCount">0 / 10000文字</span>
          <span>全角カタカナ・ひらがな・記号を変換</span>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>変換結果</h2>
          <div class="toolbar">
            
            <button class="btn btn-primary" id="copyBtn" type="button">コピー</button>
          </div>
        </div>
        <textarea id="outputText" class="output" readonly aria-label="変換結果"></textarea>
        <div class="meta">
          <span id="outputCount">0文字</span>
          <span>リアルタイム変換</span>
        </div>
        <div class="message" id="message" role="status" aria-live="polite"></div>
      </section>
    </section>

    
  </main>

  <script>
    const inputText = document.getElementById('inputText');
    const outputText = document.getElementById('outputText');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const sampleBtn = document.getElementById('sampleBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const message = document.getElementById('message');
    const inputCount = document.getElementById('inputCount');
    const outputCount = document.getElementById('outputCount');

    const MAX_LENGTH = 10000;

    const smallToLargeMap = {
      'ァ': 'ア', 'ィ': 'イ', 'ゥ': 'ウ', 'ェ': 'エ', 'ォ': 'オ',
      'ッ': 'ツ', 'ャ': 'ヤ', 'ュ': 'ユ', 'ョ': 'ヨ', 'ヮ': 'ワ',
      'ヵ': 'カ', 'ヶ': 'ケ'
    };

    const kanaMap = {
      'ア': 'ｱ', 'イ': 'ｲ', 'ウ': 'ｳ', 'エ': 'ｴ', 'オ': 'ｵ',
      'カ': 'ｶ', 'キ': 'ｷ', 'ク': 'ｸ', 'ケ': 'ｹ', 'コ': 'ｺ',
      'サ': 'ｻ', 'シ': 'ｼ', 'ス': 'ｽ', 'セ': 'ｾ', 'ソ': 'ｿ',
      'タ': 'ﾀ', 'チ': 'ﾁ', 'ツ': 'ﾂ', 'テ': 'ﾃ', 'ト': 'ﾄ',
      'ナ': 'ﾅ', 'ニ': 'ﾆ', 'ヌ': 'ﾇ', 'ネ': 'ﾈ', 'ノ': 'ﾉ',
      'ハ': 'ﾊ', 'ヒ': 'ﾋ', 'フ': 'ﾌ', 'ヘ': 'ﾍ', 'ホ': 'ﾎ',
      'マ': 'ﾏ', 'ミ': 'ﾐ', 'ム': 'ﾑ', 'メ': 'ﾒ', 'モ': 'ﾓ',
      'ヤ': 'ﾔ', 'ユ': 'ﾕ', 'ヨ': 'ﾖ',
      'ラ': 'ﾗ', 'リ': 'ﾘ', 'ル': 'ﾙ', 'レ': 'ﾚ', 'ロ': 'ﾛ',
      'ワ': 'ﾜ', 'ヲ': 'ｦ', 'ン': 'ﾝ',
      'ガ': 'ｶﾞ', 'ギ': 'ｷﾞ', 'グ': 'ｸﾞ', 'ゲ': 'ｹﾞ', 'ゴ': 'ｺﾞ',
      'ザ': 'ｻﾞ', 'ジ': 'ｼﾞ', 'ズ': 'ｽﾞ', 'ゼ': 'ｾﾞ', 'ゾ': 'ｿﾞ',
      'ダ': 'ﾀﾞ', 'ヂ': 'ﾁﾞ', 'ヅ': 'ﾂﾞ', 'デ': 'ﾃﾞ', 'ド': 'ﾄﾞ',
      'バ': 'ﾊﾞ', 'ビ': 'ﾋﾞ', 'ブ': 'ﾌﾞ', 'ベ': 'ﾍﾞ', 'ボ': 'ﾎﾞ',
      'パ': 'ﾊﾟ', 'ピ': 'ﾋﾟ', 'プ': 'ﾌﾟ', 'ペ': 'ﾍﾟ', 'ポ': 'ﾎﾟ',
      'ヴ': 'ｳﾞ',
      'ー': 'ｰ', '。': '｡', '、': '､', '・': '･', '「': '｢', '」': '｣', '゛': 'ﾞ', '゜': 'ﾟ'
    };

    function sanitizeLength(text) {
      if (text.length > MAX_LENGTH) {
        showMessage('入力は10000文字までです。超えた分は自動で削除しました。', true);
        return text.slice(0, MAX_LENGTH);
      }
      return text;
    }

    function hiraganaToKatakana(text) {
      return text.replace(/[ぁ-ゖ]/g, char => String.fromCharCode(char.charCodeAt(0) + 0x60));
    }

    function normalizeSmallKana(text) {
      return text.replace(/[ァィゥェォッャュョヮヵヶ]/g, char => smallToLargeMap[char] || char);
    }

    function toHalfWidthKatakana(input) {
      let text = sanitizeLength(input).normalize('NFKC');
      text = hiraganaToKatakana(text);
      text = normalizeSmallKana(text);
      return text.replace(/[ァ-ヶー。、・「」゛゜ヴガ-ポ]/g, char => kanaMap[char] || char);
    }

    function updateCounters() {
      inputCount.textContent = `${inputText.value.length} / ${MAX_LENGTH}文字`;
      outputCount.textContent = `${outputText.value.length}文字`;
    }

    function showMessage(text = '', isWarning = false) {
      message.textContent = text;
      message.classList.toggle('warning', isWarning);
    }

    function updateOutput() {
      const sanitized = sanitizeLength(inputText.value);
      if (sanitized !== inputText.value) inputText.value = sanitized;
      outputText.value = toHalfWidthKatakana(inputText.value);
      updateCounters();
      if (!message.classList.contains('warning')) showMessage('');
    }

    inputText.addEventListener('input', () => {
      showMessage('');
      updateOutput();
    });

    clearBtn.addEventListener('click', () => {
      inputText.value = '';
      outputText.value = '';
      updateCounters();
      showMessage('入力内容をクリアしました。');
      inputText.focus();
    });

    sampleBtn.addEventListener('click', () => {
      inputText.value = 'キャッシュ、バイチケ、ガッツポーズ、ぁぃぅゃゅょ';
      updateOutput();
      showMessage('サンプルを入力しました。');
    });

    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(outputText.value);
        showMessage('変換結果をコピーしました。');
      } catch {
        showMessage('コピーに失敗しました。', true);
      }
    });

        a.download = 'katakana-converted.txt';
        document.body.appendChild(a);

        a.remove();
        URL.revokeObjectURL(url);
        showMessage('TXTファイルとして保存しました。');
      } catch {
        showMessage('保存に失敗しました。', true);
      }
    });

    updateOutput();
  </script>
</body>
</html>
